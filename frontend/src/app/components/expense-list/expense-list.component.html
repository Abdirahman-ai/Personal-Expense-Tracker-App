<h1>Expense Tracker</h1>

<table border="1">
  <thead>
  <tr>
    <th>ID</th>
    <th>Title</th>
    <th>Category</th>
    <th>Amount</th>
    <th>Date</th>
    <th>Payment Method</th>
  </tr>
  </thead>

  <tbody>
  <tr *ngFor="let expense of expenses">
    <td>{{ expense.id }}</td>
    <td>{{ expense.title }}</td>
    <td>{{ expense.category }}</td>
    <td>{{ expense.amount }}</td>
    <td>{{ expense.date }}</td>
    <td>{{ expense.payment_method }}</td>
  </tr>
  </tbody>
</table>
